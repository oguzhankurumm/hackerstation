# HackerStation Security Research Lab
# Isolated Docker network for safe offensive testing.
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up -d juiceshop # Start only Juice Shop
#   docker compose down           # Stop all
#   docker compose logs -f        # Watch logs
#
# Networking model (post-audit 2026-04-15):
#   - hacklab:         internal:true  → targets cannot reach the internet
#   - hacklab-egress:  internal:false → only MSF joins this; for module updates
#
# Reachability caveat (verified 2026-04-15 smoke test):
#   The `ports: 127.0.0.1:…` entries below are inert on stock Docker / Docker
#   Desktop. `internal: true` removes the bridge's host gateway, so Docker's
#   iptables DNAT for published ports never gets installed. OrbStack routes
#   to containers via its own tun and `.orb.local` DNS, which IS how you
#   reach them on this workstation. The `ports:` entries are kept for
#   documentation + future portability (add a reverse-proxy on a non-internal
#   bridge if you move off OrbStack).

services:
  # ──────────────────────────────────────────
  # OWASP Juice Shop — modern vulnerable web app.
  # Covers: XSS, SQLi, CSRF, SSRF, XXE, auth bypass, etc.
  # URL: http://localhost:3000
  # ──────────────────────────────────────────
  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: hacklab-juiceshop
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - hacklab
    environment:
      - NODE_ENV=unsafe

  # ──────────────────────────────────────────
  # DVWA — Damn Vulnerable Web Application.
  # The digininja fork is actively maintained and embeds its own DB, so
  # the separate mariadb container from pre-audit compose has been removed.
  # URL: http://localhost:4280
  # Default creds: admin / password  (then click "Create / Reset Database")
  # ──────────────────────────────────────────
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: hacklab-dvwa
    ports:
      - "127.0.0.1:4280:80"
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - hacklab

  # ──────────────────────────────────────────
  # Metasploit Framework — full MSF console in a container.
  # Joined to hacklab-egress so `msfupdate` works without manual network juggling.
  # Access: docker exec -it hacklab-msf msfconsole
  # ──────────────────────────────────────────
  metasploit:
    image: metasploitframework/metasploit-framework:latest
    container_name: hacklab-msf
    stdin_open: true
    tty: true
    networks:
      - hacklab
      - hacklab-egress
    mem_limit: 1g
    restart: unless-stopped
    # No ports exposed — access only via `docker exec`

  # ──────────────────────────────────────────
  # WebGoat — OWASP teaching platform.
  # URL: http://localhost:8888/WebGoat
  # WebWolf (companion): http://localhost:9090
  # ──────────────────────────────────────────
  webgoat:
    image: webgoat/webgoat:latest
    container_name: hacklab-webgoat
    ports:
      - "127.0.0.1:8888:8080"
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - hacklab
    environment:
      WEBGOAT_PORT: 8080
      WEBWOLF_PORT: 9090
    # Upstream image declares HEALTHCHECK using `curl` but does not install curl,
    # so the container flips to "unhealthy" forever with
    # "/bin/sh: 1: curl: not found". Disable — we don't depend on it.
    healthcheck:
      disable: true

networks:
  # Primary target network. No outbound internet. Targets cannot exfiltrate.
  hacklab:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  # Egress-allowed sidecar network. Only attach containers that genuinely need
  # outbound (e.g. msfupdate). Keep this small on purpose.
  hacklab-egress:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.31.0.0/24
